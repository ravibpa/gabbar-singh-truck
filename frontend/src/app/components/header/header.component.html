<header
  class="fixed top-0 left-0 right-0 z-30 transition-all duration-500"
  [class.header-scrolled]="isScrolled()"
  [class.header-transparent]="!isScrolled()"
>
  <div class="max-w-7xl mx-auto px-4 sm:px-6">
    <div class="flex items-center justify-between h-20">

      <!-- Logo -->
      <a routerLink="/" class="flex items-center gap-3 group" (click)="closeMobileMenu()">
        <div class="logo-icon">
          <span class="text-3xl">🌶️</span>
          <div class="logo-ring"></div>
        </div>
        <div class="logo-text">
          <div class="brand-name">Gabbar Singh</div>
          <div class="brand-sub">TRUCK</div>
        </div>
      </a>

      <!-- Desktop Navigation -->
      <nav class="hidden md:flex items-center gap-8">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}"
           class="nav-link">Home</a>
        <a routerLink="/menu" routerLinkActive="active"
           class="nav-link">Menu</a>
        <a href="#about" class="nav-link">Our Story</a>
        <a href="#locations" class="nav-link">Find Us</a>
      </nav>

      <!-- Actions -->
      <div class="flex items-center gap-3">
        <!-- Cart Button -->
        <button
          (click)="cartService.toggleCart()"
          class="cart-btn relative flex items-center gap-2 px-4 py-2 rounded-xl font-semibold transition-all duration-300"
          aria-label="Open cart"
        >
          <span class="text-lg">🛒</span>
          <span class="hidden sm:inline text-sm">Cart</span>
          @if (cartService.itemCount() > 0) {
            <span class="cart-badge">{{ cartService.itemCount() }}</span>
          }
        </button>

        <!-- Order Now Button (desktop only) -->
        <a routerLink="/menu" class="btn-primary hidden md:inline-flex text-sm px-5 py-2.5">
          Order Now
        </a>

        <!-- Mobile Menu Toggle -->
        <button
          (click)="toggleMobileMenu()"
          class="md:hidden w-10 h-10 flex flex-col justify-center items-center gap-1.5 rounded-lg hover:bg-white/10 transition-colors"
          aria-label="Toggle menu"
        >
          <span class="hamburger-line" [class.open]="isMobileMenuOpen()"></span>
          <span class="hamburger-line" [class.open]="isMobileMenuOpen()"></span>
          <span class="hamburger-line" [class.open]="isMobileMenuOpen()"></span>
        </button>
      </div>
    </div>

    <!-- Mobile Menu -->
    @if (isMobileMenuOpen()) {
      <div class="mobile-menu md:hidden pb-4 border-t border-white/10">
        <nav class="flex flex-col gap-2 pt-4">
          <a routerLink="/" routerLinkActive="active-mobile" [routerLinkActiveOptions]="{exact: true}"
             (click)="closeMobileMenu()" class="mobile-nav-link">🏠 Home</a>
          <a routerLink="/menu" routerLinkActive="active-mobile"
             (click)="closeMobileMenu()" class="mobile-nav-link">🍛 Full Menu</a>
          <a href="#about" (click)="closeMobileMenu()" class="mobile-nav-link">✨ Our Story</a>
          <a href="#locations" (click)="closeMobileMenu()" class="mobile-nav-link">📍 Find Us</a>
          <a routerLink="/menu" (click)="closeMobileMenu()"
             class="btn-primary mt-2 text-center">
            🌶️ Order Now
          </a>
        </nav>
      </div>
    }
  </div>
</header>

<!-- Header spacer -->
<div class="h-20"></div>
